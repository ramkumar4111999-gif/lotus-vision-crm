# ─────────────────────────────────────────────────────────────────
# Lotus Vision CRM — GitHub Pages Deployment with Prisma Pipeline
# ─────────────────────────────────────────────────────────────────
# This workflow uses Prisma ORM + SQLite to:
#   1. Read the committed database (db/custom.db)
#   2. Export all table data → public/seed-data.json via Prisma
#   3. Build a fully static Next.js site with embedded CRM data
#   4. Deploy to GitHub Pages
#
# Data flow: GitHub Files (SQLite DB) → Prisma Query → JSON → Static Site
# ─────────────────────────────────────────────────────────────────

name: CRM Deploy — Prisma Data Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  DATABASE_URL: "file:./db/custom.db"

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Validate Prisma Schema & Database
  # ═══════════════════════════════════════════════════════════
  prisma-validate:
    name: 🔍 Prisma Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Verify database exists
        run: |
          if [ -f "db/custom.db" ]; then
            echo "✅ Database found: $(wc -c < db/custom.db) bytes"
            node -e "
              const { PrismaClient } = require('@prisma/client');
              const db = new PrismaClient();
              db.\$queryRaw\`SELECT COUNT(*) as total FROM sqlite_master WHERE type='table'\`
                .then(r => console.log('📊 Tables in DB:', r[0].total))
                .finally(() => db.\$disconnect());
            "
          else
            echo "⚠️ No database file found at db/custom.db"
            exit 1
          fi
        env:
          DATABASE_URL: "file:./db/custom.db"

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Export Customer Data
  # ═══════════════════════════════════════════════════════════
  export-customers:
    name: 👥 Export Customers
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Export Customer + Prescription + Visit + Appointment + Due data
        run: |
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const fs = require('fs');
            const db = new PrismaClient();
            (async () => {
              const models = ['Customer','Prescription','Visit','Appointment','Due'];
              const out = {};
              for (const m of models) {
                const rows = await db[m].findMany();
                out[m] = rows.map(r => {
                  const o = {};
                  for (const [k,v] of Object.entries(r)) o[k] = v instanceof Date ? v.toISOString() : v;
                  return o;
                });
                console.log('  ✓ ' + m + ': ' + out[m].length + ' rows');
              }
              fs.writeFileSync('artifacts/customers.json', JSON.stringify(out, null, 2));
              console.log('  → artifacts/customers.json');
            })().finally(() => db.\$disconnect());
          "
        env:
          DATABASE_URL: "file:./db/custom.db"
      - uses: actions/upload-artifact@v4
        with:
          name: customers-data
          path: artifacts/customers.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Export Product & Inventory Data
  # ═══════════════════════════════════════════════════════════
  export-inventory:
    name: 📦 Export Inventory
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Export Product + PurchaseOrder data
        run: |
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const fs = require('fs');
            const db = new PrismaClient();
            (async () => {
              const models = ['Product','PurchaseOrder'];
              const out = {};
              for (const m of models) {
                const rows = await db[m].findMany();
                out[m] = rows.map(r => {
                  const o = {};
                  for (const [k,v] of Object.entries(r)) o[k] = v instanceof Date ? v.toISOString() : v;
                  return o;
                });
                console.log('  ✓ ' + m + ': ' + out[m].length + ' rows');
              }
              fs.writeFileSync('artifacts/inventory.json', JSON.stringify(out, null, 2));
              console.log('  → artifacts/inventory.json');
            })().finally(() => db.\$disconnect());
          "
        env:
          DATABASE_URL: "file:./db/custom.db"
      - uses: actions/upload-artifact@v4
        with:
          name: inventory-data
          path: artifacts/inventory.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 4: Export Sales & Financial Data
  # ═══════════════════════════════════════════════════════════
  export-sales:
    name: 💰 Export Sales
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Export Sale + SaleItem + Return + Expense data
        run: |
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const fs = require('fs');
            const db = new PrismaClient();
            (async () => {
              const models = ['Sale','SaleItem','Return','Expense'];
              const out = {};
              for (const m of models) {
                const rows = await db[m].findMany();
                out[m] = rows.map(r => {
                  const o = {};
                  for (const [k,v] of Object.entries(r)) o[k] = v instanceof Date ? v.toISOString() : v;
                  return o;
                });
                console.log('  ✓ ' + m + ': ' + out[m].length + ' rows');
              }
              fs.writeFileSync('artifacts/sales.json', JSON.stringify(out, null, 2));
              console.log('  → artifacts/sales.json');
            })().finally(() => db.\$disconnect());
          "
        env:
          DATABASE_URL: "file:./db/custom.db"
      - uses: actions/upload-artifact@v4
        with:
          name: sales-data
          path: artifacts/sales.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 5: Export Lab & Staff Data
  # ═══════════════════════════════════════════════════════════
  export-operations:
    name: 🔬 Export Operations
    runs-on: ubuntu-latest
    needs: prisma-validate
