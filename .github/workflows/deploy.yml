# ─────────────────────────────────────────────────────────────────
# Lotus Vision CRM — 20-Agent Prisma Data Pipeline → GitHub Pages
# ─────────────────────────────────────────────────────────────────
# Data flow: GitHub Files (SQLite DB) → Prisma ORM → JSON → Static Site
# DATABASE_URL is a local file path only — not a secret
# ─────────────────────────────────────────────────────────────────

name: CRM Deploy — Prisma Data Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  DATABASE_URL: "file:./db/custom.db"

jobs:
  # ═══════════════════════════════════════════════════
  # JOB 1: Validate Prisma Schema & Database
  # ═══════════════════════════════════════════════════
  prisma-validate:
    name: "1 · Prisma Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
      - name: Verify database
        run: |
          if [ -f "db/custom.db" ]; then
            echo "Database: $(wc -c < db/custom.db) bytes"
          else
            echo "db/custom.db not found"; exit 1
          fi

  # ═══════════════════════════════════════════════════
  # JOB 2: Export Customers (Prisma)
  # ═══════════════════════════════════════════════════
  export-customers:
    name: "2 · Export Customers"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.cjs
      - name: Extract customer data
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('public/seed-data.json','utf-8'));const o={Customer:d.Customer,Prescription:d.Prescription,Visit:d.Visit,Appointment:d.Appointment,Due:d.Due};fs.mkdirSync('artifacts',{recursive:true});fs.writeFileSync('artifacts/customers.json',JSON.stringify(o,null,2));console.log('Customers: '+o.Customer.length+' records')"
      - uses: actions/upload-artifact@v4
        with: { name: customers-data, path: artifacts/customers.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 3: Export Inventory (Prisma)
  # ═══════════════════════════════════════════════════
  export-inventory:
    name: "3 · Export Inventory"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.cjs
      - name: Extract inventory data
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('public/seed-data.json','utf-8'));const o={Product:d.Product,PurchaseOrder:d.PurchaseOrder};fs.mkdirSync('artifacts',{recursive:true});fs.writeFileSync('artifacts/inventory.json',JSON.stringify(o,null,2));console.log('Products: '+o.Product.length+' records')"
      - uses: actions/upload-artifact@v4
        with: { name: inventory-data, path: artifacts/inventory.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 4: Export Sales (Prisma)
  # ═══════════════════════════════════════════════════
  export-sales:
    name: "4 · Export Sales"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.cjs
      - name: Extract sales data
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('public/seed-data.json','utf-8'));const o={Sale:d.Sale,SaleItem:d.SaleItem,Return:d.Return,Expense:d.Expense};fs.mkdirSync('artifacts',{recursive:true});fs.writeFileSync('artifacts/sales.json',JSON.stringify(o,null,2));console.log('Sales: '+o.Sale.length+' records')"
      - uses: actions/upload-artifact@v4
        with: { name: sales-data, path: artifacts/sales.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 5: Export Operations (Prisma)
  # ═══════════════════════════════════════════════════
  export-operations:
    name: "5 · Export Operations"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.cjs
      - name: Extract operations data
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('public/seed-data.json','utf-8'));const o={LabOrder:d.LabOrder,Staff:d.Staff,Attendance:d.Attendance,SalaryRecord:d.SalaryRecord};fs.mkdirSync('artifacts',{recursive:true});fs.writeFileSync('artifacts/operations.json',JSON.stringify(o,null,2));console.log('Lab Orders: '+o.LabOrder.length+' records')"
      - uses: actions/upload-artifact@v4
        with: { name: operations-data, path: artifacts/operations.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 6: Export Marketing (Prisma)
  # ═══════════════════════════════════════════════════
  export-marketing:
    name: "6 · Export Marketing"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.cjs
      - name: Extract marketing data
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('public/seed-data.json','utf-8'));const o={Campaign:d.Campaign,Notification:d.Notification};fs.mkdirSync('artifacts',{recursive:true});fs.writeFileSync('artifacts/marketing.json',JSON.stringify(o,null,2));console.log('Campaigns: '+o.Campaign.length+' records')"
      - uses: actions/upload-artifact@v4
        with: { name: marketing-data, path: artifacts/marketing.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 7: DB Stats (Prisma)
  # ═══════════════════════════════════════════════════
  db-stats:
    name: "7 · DB Stats"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-db-stats.cjs
      - uses: actions/upload-artifact@v4
        with: { name: db-stats, path: artifacts/db-stats.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 8: DB Schema (Prisma)
  # ═══════════════════════════════════════════════════
  db-schema:
    name: "8 · DB Schema"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-db-schema.cjs
      - uses: actions/upload-artifact@v4
        with: { name: db-schema, path: artifacts/schema.sql, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 9: DB Relations (Prisma)
  # ═══════════════════════════════════════════════════
  db-relations:
    name: "9 · DB Relations"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-db-relations.cjs
      - uses: actions/upload-artifact@v4
        with: { name: db-relations, path: artifacts/relations.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 10: Verify Data (Prisma)
  # ═══════════════════════════════════════════════════
  verify-data:
    name: "10 · Verify Data"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-verify-data.cjs

  # ═══════════════════════════════════════════════════
  # JOB 11: Prisma Client Generation
  # ═══════════════════════════════════════════════════
  prisma-client:
    name: "11 · Prisma Client"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx prisma generate

  # ═══════════════════════════════════════════════════
  # JOB 12: DB Indexes (Prisma)
  # ═══════════════════════════════════════════════════
  export-indexes:
    name: "12 · DB Indexes"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-db-indexes.cjs
      - uses: actions/upload-artifact@v4
        with: { name: db-indexes, path: artifacts/indexes.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 13: Customer Groups (Prisma)
  # ═══════════════════════════════════════════════════
  export-groups:
    name: "13 · Customer Groups"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-customer-groups.cjs
      - uses: actions/upload-artifact@v4
        with: { name: customer-groups, path: artifacts/customer-groups.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 14: Product Categories (Prisma)
  # ═══════════════════════════════════════════════════
  export-categories:
    name: "14 · Product Categories"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-product-categories.cjs
      - uses: actions/upload-artifact@v4
        with: { name: product-categories, path: artifacts/product-categories.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 15: Sales Analytics (Prisma)
  # ═══════════════════════════════════════════════════
  export-sales-analytics:
    name: "15 · Sales Analytics"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-sales-analytics.cjs
      - uses: actions/upload-artifact@v4
        with: { name: sales-analytics, path: artifacts/sales-analytics.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 16: Financial Summary (Prisma)
  # ═══════════════════════════════════════════════════
  export-financials:
    name: "16 · Financial Summary"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-financials.cjs
      - uses: actions/upload-artifact@v4
        with: { name: financials, path: artifacts/financials.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 17: DB Health (Prisma)
  # ═══════════════════════════════════════════════════
  db-health:
    name: "17 · DB Health"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/job-db-health.cjs
      - uses: actions/upload-artifact@v4
        with: { name: db-health, path: artifacts/db-health.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 18: Full DB Dump (Prisma)
  # ═══════════════════════════════════════════════════
  db-dump:
    name: "18 · Full DB Dump"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.cjs
      - uses: actions/upload-artifact@v4
        with: { name: full-dump, path: public/seed-data.json, retention-days: 1 }

  # ═══════════════════════════════════════════════════
  # JOB 19: Lint Check
  # ═══════════════════════════════════════════════════
  lint-check:
    name: "19 · Lint Check"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - name: Run ESLint
        run: npm run lint -- --max-warnings=100 || true

  # ═══════════════════════════════════════════════════
  # JOB 20: BUILD & DEPLOY
  # Assembles all artifacts → static site → GitHub Pages
  # ═══════════════════════════════════════════════════
  build-and-deploy:
    name: "20 · Build & Deploy"
    runs-on: ubuntu-latest
    needs:
      - export-customers
      - export-inventory
      - export-sales
      - export-operations
      - export-marketing
      - db-stats
      - db-schema
      - db-relations
      - verify-data
      - prisma-client
      - export-indexes
      - export-groups
      - export-categories
      - export-sales-analytics
      - export-financials
      - db-health
      - db-dump
      - lint-check
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci

      - name: Download full DB dump from Job 18
        uses: actions/download-artifact@v4
        with:
          name: full-dump
          path: ./public/seed-data.json

      - name: Verify embedded data
        run: |
          echo "Seed data:"
          ls -la public/seed-data.json
          node -e "const d=require('./public/seed-data.json');let t=0;for(const [k,v] of Object.entries(d)){if(v.length>0){console.log('  '+k+': '+v.length);t+=v.length;}}console.log('  TOTAL: '+t+' records embedded')"

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js Static Site
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build: $(find out -type f | wc -l) files"
          ls -la out/seed-data.json

      - uses: actions/upload-pages-artifact@v3
        with: { path: ./out }

      - uses: actions/deploy-pages@v4
        id: deployment