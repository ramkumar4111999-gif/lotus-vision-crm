# ─────────────────────────────────────────────────────────────────
# Lotus Vision CRM — 20-Agent Prisma Data Pipeline → GitHub Pages
# ─────────────────────────────────────────────────────────────────

name: CRM Deploy — Prisma Data Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  DATABASE_URL: "file:./db/custom.db"

jobs:
  # JOB 1
  prisma-validate:
    name: "1 · Prisma Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
      - name: Verify database
        run: |
          if [ -f "db/custom.db" ]; then echo "DB OK"; else echo "DB missing"; exit 1; fi

  # JOBS 2-6: Export data by domain
  export-customers:
    name: "2 · Customers"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs extract-customers
      - uses: actions/upload-artifact@v4
        with: { name: customers-data, path: artifacts/customers.json, retention-days: 1 }

  export-inventory:
    name: "3 · Inventory"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs extract-inventory
      - uses: actions/upload-artifact@v4
        with: { name: inventory-data, path: artifacts/inventory.json, retention-days: 1 }

  export-sales:
    name: "4 · Sales"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs extract-sales
      - uses: actions/upload-artifact@v4
        with: { name: sales-data, path: artifacts/sales.json, retention-days: 1 }

  export-operations:
    name: "5 · Operations"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs extract-operations
      - uses: actions/upload-artifact@v4
        with: { name: operations-data, path: artifacts/operations.json, retention-days: 1 }

  export-marketing:
    name: "6 · Marketing"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs extract-marketing
      - uses: actions/upload-artifact@v4
        with: { name: marketing-data, path: artifacts/marketing.json, retention-days: 1 }

  # JOBS 7-17: Analytics
  db-stats:
    name: "7 · DB Stats"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs db-stats artifacts/db-stats.json
      - uses: actions/upload-artifact@v4
        with: { name: db-stats, path: artifacts/db-stats.json, retention-days: 1 }

  db-schema:
    name: "8 · DB Schema"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: npx prisma db execute --stdin < prisma/schema.prisma > artifacts/schema.txt 2>&1 || true
      - run: cp prisma/schema.prisma artifacts/schema.sql
      - uses: actions/upload-artifact@v4
        with: { name: db-schema, path: artifacts/schema.sql, retention-days: 1 }

  db-relations:
    name: "9 · DB Relations"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs db-relations artifacts/relations.json
      - uses: actions/upload-artifact@v4
        with: { name: db-relations, path: artifacts/relations.json, retention-days: 1 }

  verify-data:
    name: "10 · Verify Data"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs verify-data

  prisma-client:
    name: "11 · Prisma Client"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx prisma generate

  export-indexes:
    name: "12 · DB Indexes"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs db-indexes artifacts/indexes.json
      - uses: actions/upload-artifact@v4
        with: { name: db-indexes, path: artifacts/indexes.json, retention-days: 1 }

  export-groups:
    name: "13 · Customer Groups"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs customer-groups artifacts/customer-groups.json
      - uses: actions/upload-artifact@v4
        with: { name: customer-groups, path: artifacts/customer-groups.json, retention-days: 1 }

  export-categories:
    name: "14 · Product Categories"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs product-categories artifacts/product-categories.json
      - uses: actions/upload-artifact@v4
        with: { name: product-categories, path: artifacts/product-categories.json, retention-days: 1 }

  export-sales-analytics:
    name: "15 · Sales Analytics"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs sales-analytics artifacts/sales-analytics.json
      - uses: actions/upload-artifact@v4
        with: { name: sales-analytics, path: artifacts/sales-analytics.json, retention-days: 1 }

  export-financials:
    name: "16 · Financial Summary"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs financials artifacts/financials.json
      - uses: actions/upload-artifact@v4
        with: { name: financials, path: artifacts/financials.json, retention-days: 1 }

  db-health:
    name: "17 · DB Health"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - run: node scripts/run-analytics.cjs db-health artifacts/db-health.json
      - uses: actions/upload-artifact@v4
        with: { name: db-health, path: artifacts/db-health.json, retention-days: 1 }

  # JOB 18
  db-dump:
    name: "18 · Full DB Dump"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci && npx prisma generate
      - run: node scripts/export-db-to-json.mjs
      - uses: actions/upload-artifact@v4
        with: { name: full-dump, path: public/seed-data.json, retention-days: 1 }

  # JOB 19
  lint-check:
    name: "19 · Lint"
    runs-on: ubuntu-latest
    needs: prisma-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run lint -- --max-warnings=100 || true

  # JOB 20: BUILD & DEPLOY
  build-and-deploy:
    name: "20 · Build & Deploy"
    runs-on: ubuntu-latest
    needs:
      - export-customers
      - export-inventory
      - export-sales
      - export-operations
      - export-marketing
      - db-stats
      - db-schema
      - db-relations
      - verify-data
      - prisma-client
      - export-indexes
      - export-groups
      - export-categories
      - export-sales-analytics
      - export-financials
      - db-health
      - db-dump
      - lint-check
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: full-dump
          path: ./downloaded-data
      - name: Move seed data to public
        run: mv downloaded-data/seed-data.json public/seed-data.json
      - name: Verify data
        run: node scripts/run-analytics.cjs db-stats
      - run: npx prisma generate
      - run: npm run build
      - run: ls out/seed-data.json
      - uses: actions/upload-pages-artifact@v3
        with: { path: ./out }
      - uses: actions/deploy-pages@v4
        id: deployment